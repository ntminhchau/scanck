name: Smart Scan Scheduler

on:
  workflow_dispatch:
  schedule:
    - cron: "31 3 * * 1-5"   # 10:31 VN, Mon-Fri
    - cron: "1 7 * * 1-5"    # 14:01 VN, Mon-Fri

jobs:
  run-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy requests tabulate openpyxl vnstock

      - name: Run scanner
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python smartscan.py
